name: Sonar Coverage

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  sonar:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain & Components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov --force

      - name: Create coverage directory
        run: mkdir -p coverage

      - name: Run Tests with Coverage Instrumentation
        env:
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-Cinstrument-coverage"
          LLVM_PROFILE_FILE: "coverage/coverage-%p-%m.profraw"
        run: cargo test --all --verbose

      - name: Generate Coverage Report (Cobertura XML)
        run: |
          grcov ./coverage \
            --binary-path ./target/debug/deps/ \
            -s . \
            -t cobertura \
            --branch \
            --ignore-not-existing \
            --ignore "/*" \
            --ignore "*/tests/*" \
            --ignore "*/examples/*" \
            -o coverage.xml

      - name: Fix Cobertura XML format
        run: |
          # DOCTYPE 제거
          sed -i '/<\!DOCTYPE/d' coverage.xml
          # XML 버전을 4.0으로 고정
          sed -i 's/version="[0-9.]*"/version="4.0"/g' coverage.xml
          # XML 선언과 루트 태그 사이에 줄바꿈이 없는 경우 수정
          sed -i 's/\?>[ ]*</\?>\n</g' coverage.xml

      - name: Verify and show coverage.xml content
        run: |
          if [ -f coverage.xml ]; then
            echo "=== coverage.xml found ==="
            echo "First 50 lines:"
            head -50 coverage.xml
            echo ""
            echo "=== File validation ==="
            xmllint --noout coverage.xml && echo "XML is valid" || echo "XML is INVALID"
          else
            echo "ERROR: coverage.xml not found!"
            exit 1
          fi

      - name: Install xmllint for validation
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate and fix XML structure
        run: |
          # xmllint로 XML 검증 및 재포맷
          xmllint --format coverage.xml > coverage_fixed.xml || {
            echo "XML validation failed, trying to fix..."
            # XML이 유효하지 않은 경우 강제로 수정
            cat coverage.xml | grep -v '<!DOCTYPE' > coverage_fixed.xml
          }
          mv coverage_fixed.xml coverage.xml
          
          echo "=== Final coverage.xml (first 30 lines) ==="
          head -30 coverage.xml

      - name: Delete all profraw files before SonarCloud scan
        run: find . -name "*.profraw" -type f -delete

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=MORUTINE_backend
            -Dsonar.organization=morutine
            -Dsonar.coverageReportPaths=coverage.xml