name: Sonar Coverage

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  sonar:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain & Components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov --force

      - name: Run Tests with Coverage Instrumentation
        env:
          CARGO_INCREMENTAL: "0"
          RUSTFLAGS: "-Cinstrument-coverage"
          LLVM_PROFILE_FILE: "%m.profraw"
        run: cargo test --all --verbose

      - name: Generate Coverage Report (lcov format)
        run: |
          grcov . \
            --binary-path ./target/debug/deps/ \
            -s . \
            -t lcov \
            --branch \
            --ignore-not-existing \
            --ignore "/*" \
            -o lcov.info

      - name: Convert lcov to Cobertura for SonarCloud
        run: |
          pip install lcov_cobertura
          lcov_cobertura lcov.info --output coverage.xml

      - name: Delete profraw files
        run: find . -name "*.profraw" -type f -delete

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=MORUTINE_backend
            -Dsonar.organization=morutine
            -Dsonar.coverageReportPaths=coverage.xml