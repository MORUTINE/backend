name: Sonar Coverage

on:
# ... (생략)
jobs:
  sonar:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov --force

      - name: Run tests with coverage instrumentation
        run: |
          CARGO_INCREMENTAL=0 \
          RUSTFLAGS="-Cinstrument-coverage" \
          LLVM_PROFILE_FILE="coverage-%p-%m.profraw" \
          cargo test --all --verbose # 4천 줄이므로 --all을 다시 시도합니다.

      - name: Generate coverage report (cobertura xml)
        run: |
          GRCOV_SOURCES="morutine-api/src morutine-common/src morutine-domain/src morutine-infra/src"
          
          # 💡 최종 수정: 불필요한 --binary-path, --llvm 옵션 모두 제거
          grcov . \
            -s ${GRCOV_SOURCES} \
            -t cobertura \
            --branch --ignore-not-existing \
            --jobs 1 \  
            -o coverage.xml

      - name: Set up PATH for SonarCloud
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=MORUTINE_backend
            -Dsonar.organization=morutine
            -Dsonar.projectBaseDir=.
            -Dsonar.coverageReportPaths=coverage.xml