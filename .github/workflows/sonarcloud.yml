name: Sonar Coverage

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  sonar:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain & Components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov --force

      - name: Run Tests with Coverage Instrumentation
        env:
          CARGO_INCREMENTAL: "0"
          RUSTFLAGS: "-Cinstrument-coverage"
          LLVM_PROFILE_FILE: "default.profraw"
        run: |
          rm -f default*.profraw
          cargo test --all --verbose

      - name: Generate Coverage Report (Cobertura XML)
        run: |
          grcov . \
            --binary-path ./target/debug/deps/ \
            -s . \
            -t cobertura \
            --branch \
            --ignore-not-existing \
            --ignore "/*" \
            -o coverage.xml

      - name: Fix Cobertura XML format for SonarCloud
        run: |
          # DTD 제거
          sed -i 's/<!DOCTYPE[^>]*>//' coverage.xml
          # XML 버전 수정
          sed -i 's/<?xml version="[^"]*"?>/<?xml version="1.0" encoding="UTF-8"?>/' coverage.xml
          # coverage 태그의 version 속성을 1로 변경
          sed -i 's/<coverage[^>]*version="[^"]*"/<coverage version="1.0"/' coverage.xml
          # sources 태그 제거
          sed -i '/<sources>/,/<\/sources>/d' coverage.xml
          # 나머지 속성들 정리
          sed -i 's/<coverage version="1.0"[^>]*>/<coverage version="1.0">/' coverage.xml

      - name: Verify fixed coverage.xml
        run: |
          echo "=== First 30 lines of coverage.xml ==="
          head -30 coverage.xml
          echo "=== Checking for DOCTYPE ==="
          grep -c "DOCTYPE" coverage.xml || echo "No DOCTYPE found (good)"
          echo "=== Checking version ==="
          grep "version=" coverage.xml | head -5

      - name: Delete profraw files
        run: find . -name "*.profraw" -type f -delete

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=MORUTINE_backend
            -Dsonar.organization=morutine
            -Dsonar.coverageReportPaths=coverage.xml