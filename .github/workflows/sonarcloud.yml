name: Sonar Coverage

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  sonar:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain & Components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov --force

      - name: Create coverage directory
        run: mkdir -p coverage

      - name: Run Tests with Coverage Instrumentation
        env:
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-Cinstrument-coverage"
          LLVM_PROFILE_FILE: "coverage/coverage-%p-%m.profraw"
        run: cargo test --all --verbose

      - name: Generate Coverage Report (Cobertura XML)
        run: |
          grcov ./coverage \
            --binary-path ./target/debug/deps/ \
            -s . \
            -t cobertura \
            --branch \
            --ignore-not-existing \
            --ignore "/*" \
            --ignore "*/tests/*" \
            --ignore "*/examples/*" \
            -o coverage.xml

      - name: Fix Cobertura XML format
        run: |
          # 모든 수정 명령을 실행
          sed -i 's/<!DOCTYPE coverage SYSTEM "http:\/\/cobertura\.sourceforge\.net\/xml\/coverage-04\.dtd">//' coverage.xml
          sed -i 's/version="1\.9"/version="1\.0"/g' coverage.xml
          sed -i 's/version="1\.0"/version="1"/' coverage.xml
          sed -i '/<sources>/,/\/sources>/d' coverage.xml

      # 💡 디버깅 스텝 추가: 수정된 파일의 앞부분 10줄 출력
      - name: Check Final XML Format
        run: |
          echo "--- CHECKING FINAL XML HEADER ---"
          head -n 10 coverage.xml
          echo "-----------------------------------"

      - name: Delete all profraw files before SonarCloud scan
        run: find . -name "*.profraw" -type f -delete

      # 💡 Clippy/Cargo PATH 문제 해결을 위해 SONAR_SCANNER_OPTS 복구
      - name: Set up Runner PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_SCANNER_OPTS: "-Dsonar.cfamily.clippy.path=/github/home/.cargo/bin"
        with:
          args: >
            -Dsonar.projectKey=MORUTINE_backend
            -Dsonar.organization=morutine
            -Dsonar.coverageReportPaths=coverage.xml
