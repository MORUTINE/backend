name: Sonar Coverage

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # grcov 실행에 필요한 llvm-tools-preview 컴포넌트 추가
          components: clippy, llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov

      - name: Run tests with coverage instrumentation
        run: |
          CARGO_INCREMENTAL=0 \
          RUSTFLAGS="-Cinstrument-coverage" \
          LLVM_PROFILE_FILE="coverage-%p-%m.profraw" \
          cargo test --all --verbose

      - name: Generate coverage report (cobertura xml 1.0)
        run: |
          grcov . \
            --binary-path ./target/debug/ \
            # SonarCloud 파서 호환성 맞춰야해서 Cobertura 1.0 버전 지정
            -s . -t cobertura --llvm --cobertura-version 1.0 \
            --branch --ignore-not-existing \
            -o coverage.xml

      # SonarCloud Scan 컨테이너가 cargo를 찾게 PATH 설정
      - name: Set up PATH for SonarCloud
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=MORUTINE_backend
            -Dsonar.organization=morutine
            -Dsonar.projectBaseDir=.
            -Dsonar.coverageReportPaths=coverage.xml # Cobertura XML 파일 경로 지정