name: Sonar Coverage

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  sonar:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain & Components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov --force

      - name: Create coverage directory
        run: mkdir -p coverage

      - name: Run Tests with Coverage Instrumentation
        env:
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-Cinstrument-coverage"
          LLVM_PROFILE_FILE: "coverage/coverage-%p-%m.profraw"
        run: cargo test --all --verbose

      - name: Generate Coverage Report (Cobertura XML)
        run: |
          grcov ./coverage \
            --binary-path ./target/debug/deps/ \
            -s . \
            -t cobertura \
            --branch \
            --ignore-not-existing \
            --ignore "/*" \
            --ignore "*/tests/*" \
            --ignore "*/examples/*" \
            -o coverage.xml

      - name: Fix Cobertura Version for SonarCloud
        run: |
          sed -i 's/version="[0-9.]*"/version="1"/g' coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=MORUTINE_backend
            -Dsonar.organization=morutine
            -Dsonar.coverageReportPaths=coverage.xml