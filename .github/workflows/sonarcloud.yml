name: Sonar Coverage

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  sonar:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # llvm-tools-preview 컴포넌트 설치
          components: clippy, llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov

      - name: Run tests with coverage instrumentation
        run: |
          CARGO_INCREMENTAL=0 \
          RUSTFLAGS="-Cinstrument-coverage" \
          LLVM_PROFILE_FILE="coverage-%p-%m.profraw" \
          cargo test --all --verbose

      - name: Generate coverage report (cobertura xml 1.0)
        run: |
          GRCOV_SOURCES="morutine-api/src morutine-common/src morutine-domain/src morutine-infra/src"
          
          grcov . \
            --binary-path ./target/debug/ \
            -s ${GRCOV_SOURCES} \
            -t cobertura --llvm --cobertura-version 1.0 \
            --branch --ignore-not-existing \
            --jobs 1 \  # 병렬 처리 제한으로 메모리 사용량 최소화
            -o coverage.xml

      # SonarCloud Scan 컨테이너가 cargo를 찾게 PATH 설정
      - name: Set up PATH for SonarCloud
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=MORUTINE_backend
            -Dsonar.organization=morutine
            -Dsonar.projectBaseDir=.
            -Dsonar.coverageReportPaths=coverage.xml