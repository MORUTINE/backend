name: Sonar Coverage

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  sonar:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain & Components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov --force

      - name: Run Tests with Coverage Instrumentation
        env:
          CARGO_INCREMENTAL: "0"
          RUSTFLAGS: "-Cinstrument-coverage"
          LLVM_PROFILE_FILE: "default.profraw"
        run: |
          rm -f default*.profraw
          cargo test --all --verbose

      - name: Generate Coverage Report (Cobertura XML)
        run: |
          echo "=== Checking for profraw files ==="
          find . -name "*.profraw" -type f
          
          echo "=== Running grcov ==="
          grcov . \
            --binary-path ./target/debug/deps/ \
            -s . \
            -t cobertura \
            --branch \
            --ignore-not-existing \
            --ignore "/*" \
            -o coverage.xml
          
          echo "=== Checking coverage.xml was created ==="
          ls -lh coverage.xml
          
          echo "=== First 20 lines of RAW coverage.xml ==="
          head -20 coverage.xml

      - name: Fix Cobertura XML format for SonarCloud
        run: |
          # 모든 수정을 한 번에
          sed -i \
            -e 's/<!DOCTYPE[^>]*>//' \
            -e 's/<?xml version="[^"]*"?>/<?xml version="1.0" encoding="UTF-8"?>/' \
            -e 's/<coverage[^>]*>/<coverage version="1">/' \
            -e '/<sources>/,/<\/sources>/d' \
            coverage.xml

      - name: Verify fixed coverage.xml
        run: |
          echo "=== First 50 lines of coverage.xml ==="
          head -50 coverage.xml
          echo ""
          echo "=== Full first line ==="
          head -1 coverage.xml
          echo ""
          echo "=== Checking for DOCTYPE ==="
          grep -c "DOCTYPE" coverage.xml || echo "No DOCTYPE found (good)"
          echo ""
          echo "=== Checking coverage tag ==="
          grep -o "<coverage[^>]*>" coverage.xml | head -1

      - name: Delete profraw files
        run: find . -name "*.profraw" -type f -delete

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=MORUTINE_backend
            -Dsonar.organization=morutine
            -Dsonar.coverageReportPaths=coverage.xml