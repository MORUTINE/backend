name: Sonar Coverage

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  sonar:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain & Components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov --force

      - name: Run Tests with Coverage Instrumentation
        env:
          CARGO_INCREMENTAL: "0"
          RUSTFLAGS: "-Cinstrument-coverage"
          LLVM_PROFILE_FILE: "%m.profraw"
        run: cargo test --all --verbose

      - name: Generate Coverage Report (Cobertura XML)
        run: |
          grcov . \
            --binary-path ./target/debug/deps/ \
            -s . \
            -t cobertura \
            --branch \
            --ignore-not-existing \
            --ignore "/*" \
            --excl-line "^\\s*((debug_)?assert(_eq|_ne)?!|#\\[derive\\()" \
            -o coverage.xml

      - name: Fix Cobertura XML for SonarCloud
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          root.set('version', '1')
          for sources in root.findall('sources'):
              root.remove(sources)
          tree.write('coverage.xml', encoding='utf-8', xml_declaration=True)
          "

      - name: Delete profraw files
        run: find . -name "*.profraw" -type f -delete

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=MORUTINE_backend
            -Dsonar.organization=morutine
            -Dsonar.coverageReportPaths=coverage.xml