name: Sonar Coverage

on:
# ... (생략)

jobs:
  sonar:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain & Components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov --force

      - name: Run Tests with Coverage Instrumentation (Limited Scope)
        run: |
          CARGO_INCREMENTAL=0 \
          RUSTFLAGS="-Cinstrument-coverage" \
          LLVM_PROFILE_FILE="coverage-%p-%m.profraw" \
          # 💡 리포트 크기 20MB 초과 문제를 해결하기 위해 가장 큰 크레이트 하나만 테스트
          cargo test -p morutine-api --verbose

      - name: Generate Coverage Report (Cobertura XML)
        run: |
          # 💡 테스트를 morutine-api로 제한했으므로, 소스 경로도 morutine-api만 지정
          GRCOV_SOURCES="morutine-api/src" 
          
          grcov . \
            --binary-path ./target/debug/ \
            -s ${GRCOV_SOURCES} \
            -t cobertura \
            --branch --ignore-not-existing \
            -o coverage.xml

      - name: Fix Cobertura Version for SonarCloud
        run: |
          # 💡 가장 안전한 방법으로 최종 버전 1을 만들기 위해 1.9, 1.0 치환 모두 실행
          sed -i 's/version="1\.9"/version="1\.0"/g' coverage.xml
          sed -i 's/version="1\.0"/version="1"/g' coverage.xml

      - name: Set up Runner PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_SCANNER_OPTS: "-Dsonar.cfamily.clippy.path=/github/home/.cargo/bin"
        with:
          args: >
            -Dsonar.projectKey=MORUTINE_backend
            -Dsonar.organization=morutine
            -Dsonar.projectBaseDir=.
            -Dsonar.coverageReportPaths=coverage.xml